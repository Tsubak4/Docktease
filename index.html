<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Docktease - Solutions Marines</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800&family=Roboto:wght@300;400;500;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      :root {
        --marine-deep: #0a2647;
        --marine-medium: #144272;
        --marine-light: #2c74b3;
        --electric-blue: #00f3ff;
        --electric-cyan: #00ffff;
        --white: #ffffff;
        --glow-intensity: 0.8;
      }

      body {
        font-family: "Roboto", sans-serif;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        background: linear-gradient(
          145deg,
          #0a2647 0%,
          #144272 35%,
          #2c74b3 70%,
          #a5d7e8 100%
        );
        color: #fff;
        position: relative;
        overflow-x: hidden;
        border: 3px solid var(--electric-blue);
        box-shadow:
          0 0 20px var(--electric-blue),
          inset 0 0 20px var(--electric-blue);
        animation: neonPulse 2s infinite ease-in-out;
      }

      @keyframes neonPulse {
        0%,
        100% {
          border-color: var(--electric-blue);
          box-shadow:
            0 0 20px var(--electric-blue),
            inset 0 0 20px var(--electric-blue);
        }
        50% {
          border-color: var(--electric-cyan);
          box-shadow:
            0 0 40px var(--electric-cyan),
            inset 0 0 30px var(--electric-cyan);
        }
      }

      .ocean {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: -1;
      }

      .bubbles {
        position: absolute;
        width: 100%;
        height: 100%;
        z-index: 0;
      }

      .bubble {
        position: absolute;
        bottom: -100px;
        background: rgba(0, 243, 255, 0.2);
        border-radius: 50%;
        box-shadow:
          0 0 20px var(--electric-blue),
          inset 0 0 10px rgba(255, 255, 255, 0.5);
        animation: rise 15s infinite ease-in;
      }

      @keyframes rise {
        0% {
          transform: translateY(0) rotate(0deg);
          opacity: 0.1;
        }
        100% {
          transform: translateY(-1000px) rotate(720deg);
          opacity: 0.8;
        }
      }

      nav {
        background: rgba(10, 38, 71, 0.3);
        backdrop-filter: blur(10px);
        border-bottom: 3px solid var(--electric-blue);
        box-shadow: 0 5px 25px var(--electric-blue);
        padding: 1rem 2rem;
        position: fixed;
        width: 100%;
        z-index: 100;
        animation: headerNeon 2s infinite ease-in-out;
      }

      @keyframes headerNeon {
        0%,
        100% {
          border-bottom-color: var(--electric-blue);
          box-shadow: 0 5px 25px var(--electric-blue);
        }
        50% {
          border-bottom-color: var(--electric-cyan);
          box-shadow: 0 5px 35px var(--electric-cyan);
        }
      }

      .nav-container {
        max-width: 1400px;
        margin: 0 auto;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .logo {
        font-size: 2rem;
        font-weight: 800;
        font-family: "Orbitron", sans-serif;
        background: linear-gradient(135deg, var(--electric-blue) 0%, #fff 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        letter-spacing: 2px;
        position: relative;
        text-shadow: 0 0 30px var(--electric-blue);
      }

      .logo::after {
        content: "";
        position: absolute;
        bottom: -5px;
        left: 0;
        width: 100%;
        height: 2px;
        background: linear-gradient(
          90deg,
          transparent,
          var(--electric-blue),
          var(--electric-cyan),
          transparent
        );
        box-shadow: 0 0 20px var(--electric-blue);
      }

      .nav-links {
        display: flex;
        gap: 2rem;
        list-style: none;
      }

      .nav-links a {
        color: #fff;
        text-decoration: none;
        font-weight: 500;
        padding: 0.5rem 1rem;
        border-radius: 30px;
        transition: all 0.3s ease;
        position: relative;
        text-shadow: 0 0 10px var(--electric-blue);
      }

      .nav-links a::before {
        content: "";
        position: absolute;
        bottom: 0;
        left: 50%;
        transform: translateX(-50%);
        width: 0;
        height: 2px;
        background: var(--electric-blue);
        box-shadow: 0 0 20px var(--electric-blue);
        transition: width 0.3s ease;
      }

      .nav-links a:hover::before {
        width: 70%;
      }

      .nav-links a:hover {
        text-shadow:
          0 0 20px var(--electric-blue),
          0 0 40px var(--electric-blue);
      }

      main {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 6rem 2rem 4rem;
        position: relative;
        z-index: 10;
      }

      .hero {
        text-align: center;
        max-width: 1200px;
        margin: 0 auto;
        border: 2px solid var(--electric-blue);
        border-radius: 50px;
        padding: 3rem;
        box-shadow:
          0 0 50px var(--electric-blue),
          inset 0 0 30px rgba(0, 243, 255, 0.3);
        backdrop-filter: blur(5px);
        animation: heroPulse 3s infinite ease-in-out;
      }

      @keyframes heroPulse {
        0%,
        100% {
          border-color: var(--electric-blue);
          box-shadow:
            0 0 50px var(--electric-blue),
            inset 0 0 30px rgba(0, 243, 255, 0.3);
        }
        50% {
          border-color: var(--electric-cyan);
          box-shadow:
            0 0 70px var(--electric-cyan),
            inset 0 0 50px rgba(0, 255, 255, 0.5);
        }
      }

      .hero h1 {
        font-family: "Orbitron", sans-serif;
        font-size: clamp(3rem, 8vw, 6rem);
        font-weight: 800;
        margin-bottom: 1.5rem;
        text-transform: uppercase;
        letter-spacing: 4px;
        animation: fadeInUp 1s ease;
        background: linear-gradient(
          135deg,
          #fff 0%,
          var(--electric-blue) 50%,
          #fff 100%
        );
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        text-shadow:
          0 0 60px var(--electric-blue),
          0 0 120px var(--electric-blue);
        position: relative;
      }

      .hero h1::before {
        content: "⚓";
        position: absolute;
        left: -50px;
        top: 50%;
        transform: translateY(-50%);
        font-size: 4rem;
        opacity: 0.5;
        animation: swing 4s infinite ease-in-out;
        text-shadow: 0 0 30px var(--electric-blue);
      }

      .hero h1::after {
        content: "⚓";
        position: absolute;
        right: -50px;
        top: 50%;
        transform: translateY(-50%);
        font-size: 4rem;
        opacity: 0.5;
        animation: swing 4s infinite ease-in-out reverse;
        text-shadow: 0 0 30px var(--electric-blue);
      }

      .hero p {
        font-size: 1.3rem;
        color: rgba(255, 255, 255, 0.9);
        margin-bottom: 3rem;
        max-width: 700px;
        margin-left: auto;
        margin-right: auto;
        line-height: 1.8;
        animation: fadeInUp 1s ease 0.2s both;
        text-shadow: 0 2px 10px rgba(0, 243, 255, 0.3);
        backdrop-filter: blur(5px);
        padding: 1.5rem;
        border-radius: 20px;
        background: rgba(0, 243, 255, 0.1);
        border: 1px solid var(--electric-blue);
        box-shadow: 0 0 30px rgba(0, 243, 255, 0.3);
      }

      .btn-connexion {
        position: relative;
        padding: 1.2rem 3.5rem;
        font-size: 1.3rem;
        font-weight: 600;
        font-family: "Orbitron", sans-serif;
        color: #0a2647;
        background: linear-gradient(135deg, var(--electric-blue), #ffffff);
        border: none;
        border-radius: 50px;
        cursor: pointer;
        overflow: hidden;
        transition: all 0.3s ease;
        box-shadow:
          0 10px 40px var(--electric-blue),
          0 0 0 2px var(--electric-blue) inset;
        text-transform: uppercase;
        letter-spacing: 2px;
        animation: fadeInUp 1s ease 0.4s both;
        border: 2px solid var(--electric-cyan);
      }

      .btn-connexion::before {
        content: "";
        position: absolute;
        top: 0;
        left: -100%;
        width: 100%;
        height: 100%;
        background: linear-gradient(
          90deg,
          transparent,
          rgba(255, 255, 255, 0.4),
          transparent
        );
        transition: left 0.5s ease;
      }

      .btn-connexion:hover {
        transform: translateY(-5px) scale(1.05);
        box-shadow:
          0 20px 50px var(--electric-blue),
          0 0 0 4px #ffffff inset;
        border-color: #ffffff;
      }

      .btn-connexion:hover::before {
        left: 100%;
      }

      .btn-connexion:active {
        transform: translateY(0) scale(0.95);
      }

      /* Modal Popup - Style exact comme l'exemple */
      .modal-overlay {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(0, 0, 0, 0.8);
        backdrop-filter: blur(8px);
        display: none;
        justify-content: center;
        align-items: center;
        z-index: 1000;
        animation: fadeIn 0.3s ease;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }

      .modal-container {
        position: relative;
        z-index: 1001;
        width: 100%;
        max-width: 400px;
        padding: 30px;
        background: linear-gradient(
          135deg,
          var(--marine-deep),
          var(--marine-medium)
        );
        border: 3px solid var(--electric-blue);
        border-radius: 15px;
        box-shadow:
          0 20px 40px rgba(0, 0, 0, 0.7),
          0 0 30px var(--electric-blue);
        transform: scale(0.9);
        animation: modalAppear 0.3s ease forwards;
      }

      @keyframes modalAppear {
        from {
          transform: scale(0.9);
          opacity: 0;
        }
        to {
          transform: scale(1);
          opacity: 1;
        }
      }

      .modal-title {
        font-family: "Orbitron", sans-serif;
        font-size: 2rem;
        color: #fff;
        margin-bottom: 30px;
        text-transform: uppercase;
        letter-spacing: 2px;
        text-align: center;
        text-shadow: 0 0 10px var(--electric-blue);
        background: linear-gradient(
          to bottom,
          #fff 0%,
          var(--electric-blue) 50%,
          var(--electric-cyan) 100%
        );
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        position: relative;
      }

      .modal-title::after {
        content: "";
        position: absolute;
        bottom: -15px;
        left: 50%;
        transform: translateX(-50%);
        width: 50%;
        height: 2px;
        background: linear-gradient(
          90deg,
          transparent,
          var(--electric-blue),
          var(--electric-cyan),
          transparent
        );
        border-radius: 2px;
        box-shadow: 0 0 10px var(--electric-blue);
      }

      .close-modal {
        position: absolute;
        top: 15px;
        right: 20px;
        background: transparent;
        border: 2px solid var(--electric-blue);
        color: var(--electric-blue);
        width: 35px;
        height: 35px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.2rem;
        cursor: pointer;
        transition: all 0.3s ease;
        box-shadow: 0 0 15px var(--electric-blue);
      }

      .close-modal:hover {
        background: var(--electric-blue);
        color: var(--marine-deep);
        transform: rotate(90deg);
        box-shadow: 0 0 25px var(--electric-blue);
      }

      /* Style des champs - Exactement comme l'exemple */
      .form-group {
        margin-bottom: 20px;
        position: relative;
      }

      .form-group label {
        display: block;
        font-family: "Orbitron", sans-serif;
        color: var(--electric-blue);
        margin-bottom: 8px;
        font-size: 0.9rem;
        text-transform: uppercase;
        letter-spacing: 1px;
        text-shadow: 0 0 10px var(--electric-blue);
      }

      .input-container {
        position: relative;
      }

      .input-container i {
        position: absolute;
        left: 12px;
        top: 50%;
        transform: translateY(-50%);
        color: var(--electric-blue);
        font-size: 1.1rem;
        text-shadow: 0 0 5px var(--electric-blue);
        z-index: 2;
      }

      .input-container input {
        width: 100%;
        padding: 12px 12px 12px 40px;
        background: rgba(10, 38, 71, 0.8);
        border: 2px solid var(--electric-blue);
        border-radius: 8px;
        color: #fff;
        font-size: 0.9rem;
        font-family: "Roboto", sans-serif;
        transition: all 0.3s ease;
        outline: none;
      }

      .input-container input:focus {
        border-color: var(--electric-cyan);
        background: rgba(10, 38, 71, 0.9);
        box-shadow: 0 0 15px var(--electric-blue);
      }

      .input-container input::placeholder {
        color: rgba(255, 255, 255, 0.5);
      }

      .btn-login {
        width: 100%;
        padding: 14px;
        background: rgba(0, 243, 255, 0.1);
        border: 2px solid var(--electric-blue);
        border-radius: 8px;
        color: #fff;
        font-family: "Orbitron", sans-serif;
        font-size: 1rem;
        text-transform: uppercase;
        letter-spacing: 1px;
        cursor: pointer;
        transition: all 0.3s ease;
        margin-top: 10px;
        text-shadow: 0 0 10px var(--electric-blue);
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 20px var(--electric-blue);
      }

      .btn-login:hover {
        background: rgba(0, 243, 255, 0.2);
        box-shadow: 0 0 25px var(--electric-blue);
        transform: translateY(-2px);
      }

      .btn-login:active {
        transform: translateY(0);
      }

      .btn-login::before {
        content: "";
        position: absolute;
        top: 0;
        left: -100%;
        width: 100%;
        height: 100%;
        background: linear-gradient(
          90deg,
          transparent,
          rgba(0, 243, 255, 0.2),
          transparent
        );
        transition: left 0.5s ease;
      }

      .btn-login:hover::before {
        left: 100%;
      }

      .message {
        margin-top: 15px;
        padding: 12px;
        border-radius: 8px;
        text-align: center;
        font-family: "Roboto", sans-serif;
        font-size: 0.9rem;
        display: none;
        border: 2px solid;
      }

      .message.success {
        display: block;
        background: rgba(0, 243, 255, 0.1);
        border-color: var(--electric-blue);
        color: #fff;
        text-shadow: 0 0 5px var(--electric-blue);
      }

      .message.error {
        display: block;
        background: rgba(255, 0, 0, 0.1);
        border-color: #ff4444;
        color: #ff9999;
        text-shadow: 0 0 5px rgba(255, 68, 68, 0.5);
      }

      .loading {
        display: none;
        text-align: center;
        margin-top: 15px;
      }

      .loading-spinner {
        display: inline-block;
        width: 25px;
        height: 25px;
        border: 2px solid rgba(0, 243, 255, 0.3);
        border-radius: 50%;
        border-top-color: var(--electric-blue);
        animation: spin 1s ease-in-out infinite;
        margin-right: 8px;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .wave-container {
        position: absolute;
        bottom: 0;
        left: 0;
        width: 100%;
        z-index: 5;
      }

      .wave {
        position: absolute;
        bottom: 0;
        left: 0;
        width: 100%;
        height: 100px;
        background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 320"><path fill="%2300f3ff" fill-opacity="0.3" d="M0,256L48,234.7C96,213,192,171,288,176C384,181,480,235,576,250.7C672,267,768,245,864,208C960,171,1056,117,1152,112C1248,107,1344,149,1392,170.7L1440,192L1440,320L1392,320C1344,320,1248,320,1152,320C1056,320,960,320,864,320C768,320,672,320,576,320C480,320,384,320,288,320C192,320,96,320,48,320L0,320Z"/></svg>');
        background-size: cover;
        background-repeat: no-repeat;
        animation: wave 8s infinite linear;
        filter: drop-shadow(0 0 20px var(--electric-blue));
      }

      .wave:nth-child(2) {
        bottom: 10px;
        opacity: 0.5;
        animation: wave 10s infinite linear reverse;
        filter: drop-shadow(0 0 30px var(--electric-cyan));
      }

      @keyframes wave {
        0% {
          transform: translateX(0) translateZ(0) scaleY(1);
        }
        50% {
          transform: translateX(-25%) translateZ(0) scaleY(0.8);
        }
        100% {
          transform: translateX(-50%) translateZ(0) scaleY(1);
        }
      }

      footer {
        background: rgba(10, 38, 71, 0.8);
        backdrop-filter: blur(10px);
        padding: 2rem;
        text-align: center;
        position: relative;
        z-index: 20;
        border-top: 3px solid var(--electric-blue);
        box-shadow: 0 -5px 25px var(--electric-blue);
        animation: footerNeon 2s infinite ease-in-out;
      }

      @keyframes footerNeon {
        0%,
        100% {
          border-top-color: var(--electric-blue);
          box-shadow: 0 -5px 25px var(--electric-blue);
        }
        50% {
          border-top-color: var(--electric-cyan);
          box-shadow: 0 -5px 35px var(--electric-cyan);
        }
      }

      .footer-content {
        max-width: 1400px;
        margin: 0 auto;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .copyright {
        color: rgba(255, 255, 255, 0.9);
        font-size: 1rem;
        text-shadow: 0 0 15px var(--electric-blue);
        letter-spacing: 1px;
        text-align: center;
      }

      @keyframes fadeInUp {
        from {
          opacity: 0;
          transform: translateY(30px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes swing {
        0%,
        100% {
          transform: translateY(-50%) rotate(-10deg);
        }
        50% {
          transform: translateY(-50%) rotate(10deg);
        }
      }

      @keyframes float {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-20px);
        }
      }

      .ship {
        position: absolute;
        bottom: 150px;
        right: 5%;
        font-size: 5rem;
        opacity: 0.2;
        animation: float 6s infinite ease-in-out;
        z-index: 1;
        filter: drop-shadow(0 0 30px var(--electric-blue));
        color: var(--electric-blue);
      }

      .anchor {
        position: absolute;
        top: 150px;
        left: 5%;
        font-size: 4rem;
        opacity: 0.2;
        transform: rotate(45deg);
        animation: swing 6s infinite ease-in-out;
        z-index: 1;
        filter: drop-shadow(0 0 30px var(--electric-blue));
        color: var(--electric-blue);
      }

      body::before,
      body::after {
        content: "";
        position: fixed;
        top: 0;
        bottom: 0;
        width: 3px;
        background: linear-gradient(
          180deg,
          var(--electric-blue),
          var(--electric-cyan),
          var(--electric-blue)
        );
        box-shadow: 0 0 30px var(--electric-blue);
        z-index: 999;
        pointer-events: none;
        animation: borderPulse 2s infinite ease-in-out;
      }

      body::before {
        left: 0;
      }

      body::after {
        right: 0;
      }

      @keyframes borderPulse {
        0%,
        100% {
          opacity: 0.5;
          box-shadow: 0 0 30px var(--electric-blue);
        }
        50% {
          opacity: 1;
          box-shadow: 0 0 50px var(--electric-cyan);
        }
      }

      .glow {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 500px;
        height: 500px;
        background: radial-gradient(
          circle,
          rgba(0, 243, 255, 0.15) 0%,
          transparent 70%
        );
        border-radius: 50%;
        pointer-events: none;
        z-index: 2;
        animation: neonPulse 4s infinite ease-in-out;
        filter: blur(50px);
      }

      @media (max-width: 768px) {
        .hero h1::before,
        .hero h1::after {
          display: none;
        }

        .footer-content {
          flex-direction: column;
          text-align: center;
        }

        .btn-connexion {
          padding: 1rem 2.5rem;
          font-size: 1.1rem;
        }

        .ship,
        .anchor {
          display: none;
        }

        .hero {
          padding: 1.5rem;
        }

        .modal-container {
          margin: 20px;
          padding: 20px;
        }
      }
    </style>
  </head>
  <body>
    <div class="ocean">
      <div class="bubbles">
        <div
          class="bubble"
          style="left: 10%; width: 20px; height: 20px; animation-duration: 12s"
        ></div>
        <div
          class="bubble"
          style="
            left: 20%;
            width: 40px;
            height: 40px;
            animation-duration: 8s;
            animation-delay: 2s;
          "
        ></div>
        <div
          class="bubble"
          style="
            left: 35%;
            width: 25px;
            height: 25px;
            animation-duration: 15s;
            animation-delay: 1s;
          "
        ></div>
        <div
          class="bubble"
          style="
            left: 50%;
            width: 50px;
            height: 50px;
            animation-duration: 10s;
            animation-delay: 3s;
          "
        ></div>
        <div
          class="bubble"
          style="
            left: 65%;
            width: 30px;
            height: 30px;
            animation-duration: 14s;
            animation-delay: 0.5s;
          "
        ></div>
        <div
          class="bubble"
          style="
            left: 80%;
            width: 35px;
            height: 35px;
            animation-duration: 9s;
            animation-delay: 2.5s;
          "
        ></div>
        <div
          class="bubble"
          style="
            left: 95%;
            width: 45px;
            height: 45px;
            animation-duration: 11s;
            animation-delay: 1.5s;
          "
        ></div>
      </div>
    </div>

    <nav>
      <div class="nav-container">
        <div class="logo">DOCKTEASE</div>
        <ul class="nav-links">
          <li><a href="#">Accueil</a></li>
          <li><a href="#">Contact</a></li>
        </ul>
      </div>
    </nav>

    <div class="ship">⛵</div>
    <div class="anchor">⚓</div>
    <div class="glow"></div>

    <main>
      <div class="hero">
        <h1>DOCKTEASE</h1>
        <p>
          🌊 L'excellence maritime à votre service<br />
          Équipements professionnels pour navigateurs d'exception<br />
          Depuis 1985, votre partenaire de confiance
        </p>

        <button class="btn-connexion" id="openLoginModal">
          ⚓ CONNEXION ENTREPRISE ⚓
        </button>
      </div>
    </main>

    <!-- Modal Popup avec le style exact de l'exemple -->
    <div class="modal-overlay" id="loginModal">
      <div class="modal-container">
        <button class="close-modal" id="closeModal">
          <i class="fas fa-times"></i>
        </button>

        <h2 class="modal-title">CONNEXION</h2>

        <form id="loginForm">
          <div class="form-group">
            <label for="email">Email</label>
            <div class="input-container">
              <i class="fas fa-user"></i>
              <input
                type="email"
                id="email"
                placeholder="contact@docktease.com"
                required
                autocomplete="off"
              />
            </div>
          </div>

          <div class="form-group">
            <label for="password">Mot de passe</label>
            <div class="input-container">
              <i class="fas fa-lock"></i>
              <input
                type="password"
                id="password"
                placeholder="••••••••"
                required
                autocomplete="off"
              />
            </div>
          </div>

          <button type="submit" class="btn-login" id="loginBtn">
            <span id="btnText">SE CONNECTER</span>
            <div class="loading" id="btnLoading">
              <div class="loading-spinner"></div>
              Connexion...
            </div>
          </button>

          <div class="message" id="message"></div>
        </form>

        <div class="copyright" style="margin-top: 20px; font-size: 0.8rem">
          Accès réservé aux entreprises partenaires
        </div>
      </div>
    </div>

    <div class="wave-container">
      <div class="wave"></div>
      <div class="wave"></div>
    </div>

    <footer>
      <div class="footer-content">
        <div class="copyright">© 2026 Docktease. Tous droits réservés.</div>
      </div>
    </footer>

    <script>
      const modalOverlay = document.getElementById("loginModal");
      const openModalBtn = document.getElementById("openLoginModal");
      const closeModalBtn = document.getElementById("closeModal");
      const loginForm = document.getElementById("loginForm");
      const emailInput = document.getElementById("email");
      const passwordInput = document.getElementById("password");
      const loginBtn = document.getElementById("loginBtn");
      const btnText = document.getElementById("btnText");
      const btnLoading = document.getElementById("btnLoading");
      const messageDiv = document.getElementById("message");

      openModalBtn.addEventListener("click", function () {
        modalOverlay.style.display = "flex";
        document.body.style.overflow = "hidden";
        emailInput.focus();

        setTimeout(() => {
          emailInput.value = "";
          passwordInput.value = "";
        }, 100);
      });

      function closeModal() {
        modalOverlay.style.display = "none";
        document.body.style.overflow = "auto";
        messageDiv.style.display = "none";
        messageDiv.className = "message";
      }

      closeModalBtn.addEventListener("click", closeModal);

      modalOverlay.addEventListener("click", function (e) {
        if (e.target === modalOverlay) {
          closeModal();
        }
      });

      document.addEventListener("keydown", function (e) {
        if (e.key === "Escape" && modalOverlay.style.display === "flex") {
          closeModal();
        }
      });

      function showMessage(text, type) {
        messageDiv.textContent = text;
        messageDiv.className = "message " + type;
      }

      function showLoading(show) {
        if (show) {
          btnText.style.display = "none";
          btnLoading.style.display = "inline-block";
          loginBtn.disabled = true;
        } else {
          btnText.style.display = "inline";
          btnLoading.style.display = "none";
          loginBtn.disabled = false;
        }
      }

      loginForm.addEventListener("submit", async function (e) {
        e.preventDefault();

        const email = emailInput.value.trim();
        const password = passwordInput.value;

        if (!email || !password) {
          showMessage("Veuillez remplir tous les champs", "error");
          return;
        }

        showLoading(true);
        showMessage("", "");

        setTimeout(() => {
          if (email === "demo@docktease.com" && password === "demo123") {
            showMessage("Connexion réussie ! Redirection...", "success");

            setTimeout(() => {
              closeModal();
              window.location.href = "dashboard.html";
            }, 1500);
          } else {
            showMessage("Email ou mot de passe incorrect", "error");
            showLoading(false);
            passwordInput.value = "";
            passwordInput.focus();
          }
        }, 1500);
      });

      document.addEventListener("DOMContentLoaded", function () {
        const hero = document.querySelector(".hero");
        hero.style.opacity = "0";
        hero.style.transform = "translateY(30px)";
        hero.style.transition = "all 0.8s ease";

        setTimeout(() => {
          hero.style.opacity = "1";
          hero.style.transform = "translateY(0)";
        }, 200);
      });

      setInterval(() => {
        const title = document.querySelector(".hero h1");
        if (Math.random() > 0.7) {
          title.style.opacity = "0.7";
          setTimeout(() => {
            title.style.opacity = "1";
          }, 50);
        }
      }, 3000);
    </script>
  </body>
</html>
